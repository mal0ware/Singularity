# ----------------------------------------------------------------------------
# Singularity release workflow — on a `v*` tag push, builds the signed (or
# ad-hoc) macOS .app + .dmg and the Windows .msi on the matching runners,
# then attaches them to a GitHub Release at that tag.
#
# Secrets consulted (all optional — each block falls back to an unsigned/
# ad-hoc artefact if the secret is absent):
#   SINGULARITY_MACOS_CODESIGN_IDENTITY  -- "Developer ID Application: ..."
#     Must be present alongside an imported keychain. See
#     docs/NEXT_STEPS_MAC.md for notarytool wiring.
#   SINGULARITY_WIN_SIGN_PFX             -- base64-encoded .pfx (OV / EV cert)
#   SINGULARITY_WIN_SIGN_PASS            -- password for the .pfx
#
# Everything here duplicates the build logic from ci.yml on purpose — CI
# runs on every PR and is gated on unit tests; release runs only on tags
# and is gated on artefact production.
# ----------------------------------------------------------------------------

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create the GH release + upload assets

jobs:
  build-macos:
    name: build macOS (.app + .dmg)
    runs-on: macos-14
    outputs:
      dmg_path: ${{ steps.pack.outputs.dmg }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Configure + build
        env:
          ID: ${{ secrets.SINGULARITY_MACOS_CODESIGN_IDENTITY }}
        run: |
          EXTRA=""
          if [ -n "$ID" ]; then
            EXTRA="-DSINGULARITY_MACOS_CODESIGN_IDENTITY=$ID"
          fi
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DSINGULARITY_BUILD_APP=ON $EXTRA
          cmake --build build --config Release --parallel

      - name: Pack .dmg
        id: pack
        working-directory: build
        run: |
          cpack -G DragNDrop -C Release --verbose
          DMG=$(ls *.dmg | head -n1)
          echo "dmg=build/$DMG" >> "$GITHUB_OUTPUT"
          echo "Produced: $DMG"

      - name: Upload .dmg artefact
        uses: actions/upload-artifact@v4
        with:
          name: Singularity-macos-dmg
          path: build/*.dmg
          if-no-files-found: error

  build-windows:
    name: build Windows (.msi)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.280.0
          cache: true

      - name: Configure + build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DSINGULARITY_BUILD_APP=ON
          cmake --build build --config Release --parallel

      - name: Pack .msi
        working-directory: build
        shell: bash
        run: cpack -G WIX -C Release --verbose

      - name: Sign .msi (if cert available)
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.SINGULARITY_WIN_SIGN_PFX }}
          PFX_PASS: ${{ secrets.SINGULARITY_WIN_SIGN_PASS }}
        run: |
          if ([string]::IsNullOrEmpty($env:PFX_B64)) {
            Write-Host "SINGULARITY_WIN_SIGN_PFX not set — shipping unsigned .msi. See docs/NEXT_STEPS_WINDOWS.md section 5."
            exit 0
          }
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:PFX_B64))
          $msi = Get-ChildItem build -Filter *.msi | Select-Object -First 1
          & signtool sign /f cert.pfx /p $env:PFX_PASS `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            $msi.FullName
          Remove-Item cert.pfx -Force

      - name: Upload .msi artefact
        uses: actions/upload-artifact@v4
        with:
          name: Singularity-windows-msi
          path: build/*.msi
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release + attach assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Singularity-macos-dmg/*.dmg
            dist/Singularity-windows-msi/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false
