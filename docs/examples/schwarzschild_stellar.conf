# Sample scene: stellar-mass Schwarzschild black hole, accretion disc from
# ISCO out to 20 M. Pass to the CLI with `--scene docs/examples/...`
# for any mode that consumes scene parameters (disc-preview, 2d-toy,
# kerr-geometry, photon-orbit, …).

mass              = 1.0        # geometrized units; scale factor doesn't affect shape
spin              = 0.0        # non-rotating

disc_r_inner      = -1.0       # -1 auto-selects ISCO for the spin (6 M at a=0)
disc_r_outer      = 20.0
disc_doppler_on   = true
disc_redshift_on  = true

camera_fov_deg    = 60.0
camera_distance   = 30.0
camera_elevation  = 0.0

h_step            = 0.1
max_steps         = 5000
