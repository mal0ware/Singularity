# Sample scene: near-extremal Kerr black hole (a/M = 0.94, roughly the spin
# estimate for Gargantua in Interstellar per Thorne). The disc edge sits
# well inside the Schwarzschild photon sphere thanks to frame dragging —
# this is the regime where the famous accretion-disc lensing image gets
# its characteristic tight inner halo.
#
# Pass to the CLI with `--scene docs/examples/kerr_near_extremal.conf`.

mass              = 1.0
spin              = 0.94       # a/M = 0.94 → r_+ ≈ 1.34 M, ISCO ≈ 2.04 M

disc_r_inner      = -1.0       # auto ISCO (≈ 2.04 M at this spin)
disc_r_outer      = 25.0
disc_doppler_on   = true
disc_redshift_on  = true

camera_fov_deg    = 55.0
camera_distance   = 40.0
camera_elevation  = 0.15       # slight tilt to show disc asymmetry clearly

# Tighter integrator for the near-extremal regime — rays wrap tightly around
# the photon sphere so coarser steps lose them.
h_step            = 0.05
max_steps         = 8000
